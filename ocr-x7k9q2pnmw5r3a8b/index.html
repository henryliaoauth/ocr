<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authme OCR</title>
    <link rel="stylesheet" href="/ocr-x7k9q2pnmw5r3a8b/style.css?v=11">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            }
        };
    </script>
</head>
<body>
    <div class="app">
        <nav class="topbar">
            <div class="brand">
                <div class="brand-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="4 7 4 4 20 4 20 7"></polyline>
                        <line x1="9" y1="20" x2="15" y2="20"></line>
                        <line x1="12" y1="4" x2="12" y2="20"></line>
                    </svg>
                </div>
                <span class="brand-name">Authme <span class="brand-accent">OCR</span></span>
            </div>
            <div class="topbar-meta">
                <span class="status-dot"></span>
                <span class="status-text">Ready</span>
            </div>
        </nav>

        <main>
            <div class="panel panel-source">
                <div class="panel-header">
                    <span class="panel-label">來源 Source</span>
                </div>
                <div class="panel-body">
                    <select class="category-select" id="categorySelect">
                        <option value="salaried">上班族（固定機構受雇）</option>
                        <option value="self_employed">自營商 / 公司負責人或股東</option>
                        <option value="homemaker">家管 / 退休 / 自由業</option>
                    </select>

                    <div class="sample-section" id="sampleSection" style="display: none;">
                        <div class="sample-header">
                            <span class="sample-title">範例資料</span>
                            <button class="sample-load-all" id="sampleLoadAll" type="button">全部載入</button>
                        </div>
                        <p class="sample-hint">點選下方圖片即可加入分析（依分類提供）</p>
                        <div class="sample-grid" id="sampleGrid"></div>
                    </div>

                    <div class="upload-section">
                        <label class="upload-area" id="uploadArea" for="fileInput">
                            <div class="upload-content">
                                <div class="upload-icon">
                                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                        <polyline points="17 8 12 3 7 8"/>
                                        <line x1="12" y1="3" x2="12" y2="15"/>
                                    </svg>
                                </div>
                                <p class="upload-label">Drop images here</p>
                                <p class="upload-hint">or click to browse · 可一次選多張</p>
                                <p class="upload-formats">JPG, PNG, GIF, BMP · 每張上限 50MB（上傳前自動最佳化）</p>
                            </div>
                        </label>
                        <input type="file" id="fileInput" accept="image/*" multiple hidden>
                    </div>
                </div>
                <div class="panel-footer" id="sourceActions" style="display: none;">
                    <span class="action-hint" id="actionHint">已選 0 份</span>
                    <button class="btn-analyze" id="analyzeBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="5 3 19 12 5 21 5 3"></polygon>
                        </svg>
                        開始分析
                    </button>
                </div>
            </div>

            <div class="panel panel-stage">
                <div class="panel-header">
                    <span class="panel-label">文件 Documents</span>
                    <span class="stage-count" id="stageCount" style="display: none;"></span>
                </div>
                <div class="panel-body">
                    <label class="stage-empty" id="stageEmpty" for="fileInput">
                        <div class="stage-empty-icon">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="4" width="18" height="16" rx="2"></rect>
                                <line x1="3" y1="9" x2="21" y2="9"></line>
                                <line x1="9" y1="9" x2="9" y2="20"></line>
                            </svg>
                        </div>
                        <p class="stage-empty-title">文件會在這裡放大顯示</p>
                        <p class="stage-empty-hint">從左側選取範例、或將圖片拖放到此處</p>
                    </label>

                    <div class="preview-section" id="previewSection" style="display: none;">
                        <div class="preview-grid" id="previewGrid"></div>
                    </div>
                </div>
            </div>

            <div class="col-resizer" id="colResizer" role="separator" aria-orientation="vertical" aria-label="調整中欄與分析欄寬度" tabindex="0"></div>

            <div class="panel panel-output">
                <div class="panel-header">
                    <span class="panel-label">Output</span>
                    <div class="result-tabs" id="resultTabs" style="display: none;">
                        <button class="tab-btn active" data-view="report">報告</button>
                        <button class="tab-btn" data-view="ocr">OCR</button>
                        <button class="tab-btn" data-view="source">原文 Markdown</button>
                    </div>
                </div>
                <div class="panel-body">
                    <div class="loading-section" id="loadingSection" style="display: none;">
                        <div class="scan-effect">
                            <div class="scan-line"></div>
                        </div>
                        <p class="loading-text" id="loadingText">Analyzing document<span class="loading-dots"></span></p>
                        <div class="progress-bar-wrap">
                            <div class="progress-bar-track">
                                <div class="progress-bar-fill" id="progressFill"></div>
                            </div>
                            <span class="progress-pct" id="progressPct">0%</span>
                        </div>
                    </div>

                    <div class="empty-state" id="emptyState">
                        <div class="empty-icon">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                                <line x1="16" y1="13" x2="8" y2="13"></line>
                                <line x1="16" y1="17" x2="8" y2="17"></line>
                                <polyline points="10 9 9 9 8 9"></polyline>
                            </svg>
                        </div>
                        <p>Upload an image to extract text</p>
                    </div>

                    <div class="result-section" id="resultSection" style="display: none;">
                        <div class="result-content">
                            <div id="reportView" class="result-view active"></div>
                            <div id="ocrView" class="result-view"></div>
                            <div id="sourceView" class="result-view"></div>
                        </div>
                        <div class="result-actions">
                            <button class="btn-action btn-copy" id="copyBtn">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                                </svg>
                                Copy
                            </button>
                            <button class="btn-action btn-reset" id="resetBtn">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="1 4 1 10 7 10"></polyline>
                                    <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
                                </svg>
                                Reset
                            </button>
                        </div>
                    </div>

                    <div class="error-section" id="errorSection" style="display: none;">
                        <div class="error-content">
                            <div class="error-icon">!</div>
                            <p id="errorMessage"></p>
                            <button class="btn-action btn-error" id="errorResetBtn">Try again</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose" type="button" aria-label="關閉">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
        <img id="lightboxImg" alt="放大檢視">
    </div>

    <script src="/ocr-x7k9q2pnmw5r3a8b/script.js?v=17"></script>
</body>
</html>
