<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authme OCR</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            }
        };
    </script>
</head>
<body>
    <div class="app">
        <nav class="topbar">
            <div class="brand">
                <div class="brand-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="4 7 4 4 20 4 20 7"></polyline>
                        <line x1="9" y1="20" x2="15" y2="20"></line>
                        <line x1="12" y1="4" x2="12" y2="20"></line>
                    </svg>
                </div>
                <span class="brand-name">Authme <span class="brand-accent">OCR</span></span>
            </div>
            <div class="topbar-meta">
                <span class="status-dot"></span>
                <span class="status-text">Ready</span>
            </div>
        </nav>

        <main>
            <div class="panel panel-source">
                <div class="panel-header">
                    <span class="panel-label">Source</span>
                </div>
                <div class="panel-body">
                    <div class="upload-section">
                        <div class="upload-area" id="uploadArea">
                            <div class="upload-content">
                                <div class="upload-icon">
                                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                        <polyline points="17 8 12 3 7 8"/>
                                        <line x1="12" y1="3" x2="12" y2="15"/>
                                    </svg>
                                </div>
                                <p class="upload-label">Drop image here</p>
                                <p class="upload-hint">or click to browse</p>
                                <p class="upload-formats">JPG, PNG, GIF, BMP</p>
                            </div>
                            <input type="file" id="fileInput" accept="image/*" hidden>
                        </div>
                    </div>

                    <div class="preview-section" id="previewSection" style="display: none;">
                        <div class="image-preview">
                            <img id="previewImage" alt="Preview">
                            <button class="btn-remove" id="removeBtn" title="Remove image">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="18" y1="6" x2="6" y2="18"></line>
                                    <line x1="6" y1="6" x2="18" y2="18"></line>
                                </svg>
                            </button>
                        </div>
                        <button class="btn-analyze" id="analyzeBtn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polygon points="5 3 19 12 5 21 5 3"></polygon>
                            </svg>
                            Analyze
                        </button>
                    </div>
                </div>
            </div>

            <div class="panel panel-output">
                <div class="panel-header">
                    <span class="panel-label">Output</span>
                    <div class="result-tabs" id="resultTabs" style="display: none;">
                        <button class="tab-btn active" data-view="formatted">Rendered</button>
                        <button class="tab-btn" data-view="markdown">Raw</button>
                    </div>
                </div>
                <div class="panel-body">
                    <div class="loading-section" id="loadingSection" style="display: none;">
                        <div class="scan-effect">
                            <div class="scan-line"></div>
                        </div>
                        <p class="loading-text">Analyzing document<span class="loading-dots"></span></p>
                    </div>

                    <div class="empty-state" id="emptyState">
                        <div class="empty-icon">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                                <line x1="16" y1="13" x2="8" y2="13"></line>
                                <line x1="16" y1="17" x2="8" y2="17"></line>
                                <polyline points="10 9 9 9 8 9"></polyline>
                            </svg>
                        </div>
                        <p>Upload an image to extract text</p>
                    </div>

                    <div class="result-section" id="resultSection" style="display: none;">
                        <div class="result-content">
                            <div id="formattedView" class="result-view active"></div>
                            <textarea id="markdownView" class="result-view" readonly placeholder="Raw markdown output..."></textarea>
                        </div>
                        <div class="result-actions">
                            <button class="btn-action btn-copy" id="copyBtn">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                                </svg>
                                Copy
                            </button>
                            <button class="btn-action btn-reset" id="resetBtn">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="1 4 1 10 7 10"></polyline>
                                    <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
                                </svg>
                                Reset
                            </button>
                        </div>
                    </div>

                    <div class="error-section" id="errorSection" style="display: none;">
                        <div class="error-content">
                            <div class="error-icon">!</div>
                            <p id="errorMessage"></p>
                            <button class="btn-action btn-error" id="errorResetBtn">Try again</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
